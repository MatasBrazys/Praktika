services:
  db:
    image: postgres:15-alpine
    container_name: it-services-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports — DB not accessible from host
    
  openldap:
    image: osixia/openldap:1.5.0
    container_name: it-services-ldap
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: ${LDAP_BIND_USER:-svc-readonly}
      LDAP_READONLY_USER_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_TLS: "true"
      LDAP_TLS_VERIFY_CLIENT: "never"
      LDAP_TLS_ENFORCE: "false"
      LDAP_TLS_CRT_FILENAME: ldap.crt
      LDAP_TLS_KEY_FILENAME: ldap.key
      LDAP_TLS_CA_CRT_FILENAME: ldap-ca.pem
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif
      - ./certs/ldap.crt:/container/service/slapd/assets/certs/ldap.crt:ro
      - ./certs/ldap.key:/container/service/slapd/assets/certs/ldap.key:ro
      - ./certs/ldap-ca.pem:/container/service/slapd/assets/certs/ldap-ca.pem:ro
    command: --copy-service
    restart: unless-stopped


  backend:
    build: ./backend
    container_name: it-services-backend
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LDAP_HOST: openldap
      LDAP_PORT: ${LDAP_PORT:-636}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-true}
      LDAP_TLS_VERIFY: ${LDAP_TLS_VERIFY:-true}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_BIND_USER: ${LDAP_BIND_USER:-svc-readonly}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_CA_CERT_PATH: /certs/ldap-ca.pem
      LDAP_ADMIN_GROUP: ${LDAP_ADMIN_GROUP}
      LDAP_USER_GROUP: ${LDAP_USER_GROUP}
      LDAP_CONFIRMER_GROUP: ${LDAP_CONFIRMER_GROUP}
      APP_URL: ${APP_URL}
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      db:
        condition: service_healthy
      openldap:
        condition: service_started
    volumes:
      - ./certs:/certs:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: it-services-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend

  mock-api:
    build:
      context: ./mock_api
      dockerfile: Dockerfile
    container_name: it-services-mock-api
    restart: unless-stopped
    # No ports — only accessible internally

  
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: it-services-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - openldap
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: it-services-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:9999:8080"  # tik localhost, ne tinkle
    restart: unless-stopped

volumes:
  postgres_data:
  ldap_data:     
  ldap_config:   